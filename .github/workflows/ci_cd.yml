name: CI/CD Pipeline - Olist Lakehouse

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Baixa o código do repositório
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. Configura Python
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. --- O PULO DO GATO --- Configura JAVA (Obrigatório para PySpark)
    - name: Set up Java (OpenJDK 11)
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'

    # 4. Instala dependências
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pylint

    # 5. Verifica qualidade do código (Linting)
    # Ignora erros do tipo "C" (Convention) para não ser chato demais
    - name: Lint with Pylint
      run: |
        pylint 08_pipelines/*.py 09_data_app/*.py --disable=C,R,W0611 --exit-zero

    # 6. Roda os Testes
    - name: Run Tests
      run: |
        # Se a pasta tests existir, roda. Senão, apenas imprime aviso.
        if [ -d "tests" ]; then
          pytest tests/
        else
          echo "⚠️ Pasta de testes não encontrada. Pulando etapa."
        fi