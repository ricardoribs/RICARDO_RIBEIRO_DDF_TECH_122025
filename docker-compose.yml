version: '3.8'

services:
  # Serviço 1: O Cérebro (UI do Prefect)
  prefect-server:
    image: prefecthq/prefect:2-latest
    container_name: olist_prefect_server
    entrypoint: ["prefect", "server", "start", "--host", "0.0.0.0"]
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import requests; requests.get('http://localhost:4200/api/health').raise_for_status()"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Serviço 2: O Operário (Seu Pipeline)
  etl-job:
    build: .
    container_name: olist_etl_runner
    depends_on:
      prefect-server:
        condition: service_healthy
    volumes:
      - ./09_lakehouse:/app/09_lakehouse
      - ./olist_analytics:/app/olist_analytics
      - ./src:/app/src
    env_file:
      - .env
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
      - PYTHONPATH=/app
    command: >
      bash -c "echo '✅ Prefect Server está Healthy! Iniciando...' && 
               python src/orchestration/flow_main.py && 
               echo '📊 Rodando dbt...' && 
               cd olist_analytics && dbt run --profiles-dir ."

volumes:
  prefect_data:
