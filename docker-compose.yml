version: '3.8'

services:
  etl-pipeline:
    build: .
    container_name: dadosfera_etl
    volumes:
      - .:/app
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - PREFECT_API_URL=${PREFECT_API_URL}
    # Comando robusto que aguarda e executa
    command: >
      bash -c "echo '⏳ Iniciando Pipeline...' && 
               python src/orchestration/flow_main.py"

  dashboard:
    build: . 
    container_name: olist_dashboard
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    command: streamlit run src/app/dashboard.py
    depends_on:
      - etl-pipeline